<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFH Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #08080d;
      color: #f0f0f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #0f0f17;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
    }
    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #ff2d41;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.5px;
      color: #f0f0f8;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #9090a8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">TFH Rankings</div>
    <h1>Members Only</h1>
    <p>This tool is available exclusively to TFH members. Access it through your member dashboard.</p>
  </div>
</body>
</html>
